# ── DEPRECATED — NOT USED in SRE Agent v4+ ───────────────────────────────────
#
# This file was used in v3 when the agent exposed a Prometheus /metrics endpoint.
# Since v4 the agent no longer uses prometheus_client. The monitoring stack
# (kube-prometheus-stack + Grafana) is no longer required.
#
# The agent now serves a self-contained web UI on port 8080:
#   /           — cluster health dashboard
#   /health     — JSON health check (used by K8s liveness/readiness probes)
#   /api/status — latest check result as JSON
#
# To open the dashboard:
#   kubectl port-forward -n sre-agent svc/sre-agent 8080:80
#   open http://localhost:8080/
#
# If a previous deployment applied this ServiceMonitor, clean it up with:
#   kubectl delete servicemonitor sre-agent -n monitoring --ignore-not-found
#
# ─────────────────────────────────────────────────────────────────────────────
