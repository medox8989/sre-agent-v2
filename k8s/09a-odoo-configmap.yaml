# ── Process-exporter ConfigMap — apply per Odoo namespace ───────────────────
# kubectl apply -f k8s/09a-odoo-configmap.yaml -n hafedh
# kubectl apply -f k8s/09a-odoo-configmap.yaml -n sadan
# (repeat for every Odoo namespace)
apiVersion: v1
kind: ConfigMap
metadata:
  name: process-exporter-config
  labels:
    app: odoo
    component: process-exporter
data:
  config.yml: |
    process_names:
      # Gevent/longpolling — always 1, has "gevent" as second arg
      - name: "odoo_gevent"
        cmdline:
          - '/usr/bin/odoo gevent'
      # master + N HTTP workers + cron  (count = workers + 2)
      - name: "odoo_workers"
        cmdline:
          - '/usr/bin/odoo'
