# ══════════════════════════════════════════════════════════════════════════════
# process-exporter — Sub-pod Odoo Worker Process Monitoring
#
# What this gives you:
#   - How many Odoo worker processes are running per node
#   - CPU and memory (RSS) consumption per worker group
#   - Open file descriptors — active connection proxy
#   - Worker process age — detect workers that crashed and restarted
#
# How Odoo workers appear in /proc:
#   Odoo does NOT use setproctitle. Every process (master, HTTP workers, cron)
#   shows the same cmdline: /usr/bin/python3 /usr/bin/odoo -c <config>
#   Only the gevent/longpolling worker is distinguishable — it has "gevent"
#   as an argument: /usr/bin/python3 /usr/bin/odoo gevent -c <config>
#
#   Groups defined here:
#     odoo_gevent   → 1 process  (longpolling/bus)
#     odoo_workers  → N+2 processes  (1 master + N HTTP workers + 1 cron)
#     HTTP worker count ≈ odoo_workers - 2
#
#   process-exporter reads /proc on the node and groups processes by cmdline.
#
# Architecture:
#   DaemonSet in 'monitoring' namespace, one pod per node, hostPID: true
#   Prometheus scrapes via ServiceMonitor (kube-prometheus-stack)
#   Grafana dashboard: grafana/odoo-process-workers-dashboard.json
#
# Per-namespace breakdown (optional — better visibility):
#   For per-namespace metrics add a sidecar to each Odoo deployment.
#   See the sidecar section at the bottom of this file.
#
# Deploy:
#   kubectl apply -f k8s/08-process-exporter.yaml
#
# Verify:
#   kubectl port-forward -n monitoring daemonset/process-exporter 9256
#   curl -s localhost:9256/metrics | grep namedprocess_namegroup_num_procs
#
# NOTE: This DaemonSet intentionally uses hostPID: true.
#   The SRE agent will flag it as HostPIDPod (WARNING).
#   Add the label: sre.io/skip-hostpid: "monitoring" to suppress if needed.
# ══════════════════════════════════════════════════════════════════════════════

# ── 1. ConfigMap — which processes to track ──────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: process-exporter-config
  namespace: monitoring
  labels:
    app: process-exporter
data:
  config.yml: |
    process_names:

      # ── Odoo Gevent / Longpolling Worker ─────────────────────────────────
      # MUST be first — "odoo gevent" is the only distinguishable worker.
      # cmdline: /usr/bin/python3 /usr/bin/odoo gevent -c /etc/odoo/odoo.conf
      # Count = always 1 per Odoo instance (longpolling / bus / live chat)
      - name: "odoo_gevent"
        cmdline:
          - '/usr/bin/odoo gevent'

      # ── All other Odoo processes (master + HTTP workers + cron worker) ───
      # Odoo does NOT use setproctitle — every worker has an identical cmdline:
      #   /usr/bin/python3 /usr/bin/odoo -c /etc/odoo/odoo.conf ...
      # There is no way to tell master, HTTP workers, and cron apart via /proc.
      #
      # Group size = 1 master + workers_count HTTP + 1 cron = workers_count + 2
      # With workers = 7  →  expect 9 processes in this group.
      # HTTP worker count ≈  num_procs - 2
      - name: "odoo_workers"
        cmdline:
          - '/usr/bin/odoo'

      # ── PostgreSQL backend processes (one per active DB connection) ───────
      - name: "postgres_backend"
        cmdline:
          - 'postgres: '

      # ── PostgreSQL postmaster / main process ──────────────────────────────
      - name: "postgres_main"
        cmdline:
          - 'postgres -D'

---
# ── 2. ServiceAccount ────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: process-exporter
  namespace: monitoring
  labels:
    app: process-exporter

---
# ── 3. DaemonSet — one pod per node, reads /proc with hostPID ───────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: process-exporter
  namespace: monitoring
  labels:
    app: process-exporter
spec:
  selector:
    matchLabels:
      app: process-exporter
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: process-exporter
      annotations:
        # Intentional hostPID — monitoring exception
        sre.io/skip-hostpid: "monitoring-daemonset"
    spec:
      serviceAccountName: process-exporter
      # ── hostPID: required to read /proc of ALL processes on the node ──────
      hostPID: true
      tolerations:
        # Run on ALL nodes including control-plane and tainted nodes
        - operator: "Exists"
          effect: "NoSchedule"
        - operator: "Exists"
          effect: "NoExecute"
      containers:
        - name: process-exporter
          image: docker.io/ncabatoff/process-exporter:0.7.10
          imagePullPolicy: IfNotPresent
          args:
            - --config.path=/config/config.yml
            - --procfs=/host/proc
            - --web.listen-address=:9256
          ports:
            - name: metrics
              containerPort: 9256
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          resources:
            requests:
              cpu:    20m
              memory: 64Mi
            limits:
              cpu:    100m
              memory: 128Mi
          securityContext:
            # Needs read access to /proc of all users on the node
            runAsUser: 0
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet: { path: /metrics, port: 9256 }
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /metrics, port: 9256 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: process-exporter-config
        - name: proc
          hostPath:
            path: /proc

---
# ── 4. Service ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: process-exporter
  namespace: monitoring
  labels:
    app: process-exporter
spec:
  selector:
    app: process-exporter
  ports:
    - name: metrics
      port: 9256
      targetPort: 9256
  clusterIP: None   # Headless — ServiceMonitor scrapes each pod individually

---
# ── 5. ServiceMonitor — tells Prometheus to scrape process-exporter ──────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: process-exporter
  namespace: monitoring
  labels:
    app: process-exporter
    release: prometheus-stack    # kube-prometheus-stack selector
spec:
  selector:
    matchLabels:
      app: process-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 20s
      relabelings:
        # Add the node name as a label so we can filter per node in Grafana
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod

# ══════════════════════════════════════════════════════════════════════════════
# SIDECAR APPROACH — Per-namespace worker visibility (optional, better)
#
# Add this to each Odoo Deployment spec.template to get per-namespace metrics:
#
# spec:
#   template:
#     spec:
#       shareProcessNamespace: true   # ← lets the sidecar see Odoo processes
#       containers:
#         # ... your existing odoo container ...
#         - name: process-exporter
#           image: docker.io/ncabatoff/process-exporter:0.7.10
#           args:
#             - --config.path=/config/config.yml
#             - --web.listen-address=:9256
#           ports:
#             - containerPort: 9256
#               name: proc-metrics
#           volumeMounts:
#             - name: proc-exporter-config
#               mountPath: /config
#               readOnly: true
#           resources:
#             requests: { cpu: 10m, memory: 32Mi }
#             limits:   { cpu: 50m,  memory: 64Mi }
#       volumes:
#         - name: proc-exporter-config
#           configMap:
#             name: process-exporter-config  # same ConfigMap above
#
# Then add pod annotation for Prometheus scraping:
#   annotations:
#     prometheus.io/scrape: "true"
#     prometheus.io/port:   "9256"
#
# With this approach metrics will have namespace + pod labels → full
# per-namespace worker breakdown in the dashboard.
