apiVersion: v1
kind: Secret
metadata:
  name: sre-agent-secrets
  namespace: sre-agent
  labels:
    app: sre-agent
type: Opaque
stringData:
  # ── Slack Incoming Webhook ───────────────────────────────────────────────
  # Create one at: https://api.slack.com/messaging/webhooks
  # Leave empty ("") to disable Slack alerts (dashboard still works)
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/HERE"
