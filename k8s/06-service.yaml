apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app: sre-agent
spec:
  selector:
    app: sre-agent
  ports:
    - name: http             # Named 'http' — referenced by ServiceMonitor endpoint
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP            # Internal only — access via kubectl port-forward
                             # Change to LoadBalancer/NodePort for external access
