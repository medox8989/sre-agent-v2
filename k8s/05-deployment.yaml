apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app: sre-agent
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
      annotations:
        # Web UI and health check on port 8080
        # Access: kubectl port-forward -n sre-agent svc/sre-agent 8080:80
        sre-agent/web-ui: "http://localhost:8080/"
    spec:
      serviceAccountName: sre-agent

      # ── Pull from your OCIR (same registry as all Odoo images) ──────────
      imagePullSecrets:
        - name: ocir-secret    # copied from another namespace — see deploy.sh

      # ── Tolerate all node pools (prod + demo) and autoscaler taints ─────
      tolerations:
        - key: "env"
          operator: "Equal"
          value: "prod"
          effect: "NoSchedule"
        - key: "env"
          operator: "Equal"
          value: "demo"
          effect: "NoSchedule"
        - key: "DeletionCandidateOfClusterAutoscaler"
          operator: "Exists"
          effect: "PreferNoSchedule"

      # ── Non-root security context ────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: sre-agent
          # ── IMPORTANT: update tag when you rebuild ──────────────────────
          image: jed.ocir.io/ax39qm2olrf8/jamiat-images:sre-agent-v5
          imagePullPolicy: IfNotPresent   # versioned tag — no need to re-pull on every restart

          # Default: continuous loop.
          # On-demand: kubectl exec deploy/sre-agent -n sre-agent -- python agent.py --once
          command: ["python", "agent.py"]

          env:
            # Force ANSI colors even when stdout is not a tty
            - name: FORCE_COLOR
              value: "1"

          # Load config thresholds from ConfigMap, Slack webhook from Secret
          envFrom:
            - configMapRef:
                name: sre-agent-config
            - secretRef:
                name: sre-agent-secrets

          # ── Expose web UI port ───────────────────────────────────────────
          ports:
            - name: http              # matches the Service port name in 06-service.yaml
              containerPort: 8080
              protocol: TCP

          # ── Resource limits ──────────────────────────────────────────────
          # Memory breakdown (v5):
          #   Python 3.11 runtime + alpine base:        ~30 MB
          #   kubernetes + requests client libs:         ~55 MB
          #   MetricsCollector (3 deques, 24h/7d/30d):  ~5–15 MB
          #   Embedded HTML dashboard template:          ~2 MB
          #   Pod restart + cost cache:                  ~5 MB
          #   In-flight request buffers + slack:         ~5 MB
          #   Total expected peak:                       ~120–150 MB
          # Request set to 256Mi, limit at 512Mi for safety headroom.
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 300m
              memory: 512Mi
              ephemeral-storage: 300Mi

          # ── Liveness: HTTP GET /health — confirms the metrics server is alive ──
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

          # ── Readiness: same endpoint — pod only receives traffic when healthy ──
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 2

      restartPolicy: Always
      terminationGracePeriodSeconds: 15
